{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <div class="icon-badge"><i data-feather="lock"></i></div>
            <h1>Admin Login</h1>
            <p class="subtitle">Create exams, view registrations, and manage QR codes.</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label for="password"><i data-feather="key"></i> Password</label>
                <input type="password" id="password" name="password" required autofocus />
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i data-feather="log-in"></i> Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
